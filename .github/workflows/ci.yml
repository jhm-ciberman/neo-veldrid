name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libassimp-dev
          # Silk.NET's library loader can't find NuGet-packaged native libraries
          # on Linux CI. Restore packages and symlink them to /usr/local/lib/.
          dotnet restore VeldridSilk.slnx
          for lib in $(find ~/.nuget/packages -path "*/runtimes/linux-x64/native/*.so*" -type f); do
            sudo ln -sf "$lib" "/usr/local/lib/$(basename $lib)"
          done
          sudo ldconfig

      - name: Build
        run: dotnet build VeldridSilk.slnx -c Release

      - name: Run SPIRV tests
        run: dotnet test tests/Veldrid.SPIRV.Tests/Veldrid.SPIRV.Tests.csproj -c Release

      - name: Run non-GPU tests
        run: dotnet test tests/Veldrid.Tests/Veldrid.Tests.csproj -c Release -p:ExcludeGPU=true
